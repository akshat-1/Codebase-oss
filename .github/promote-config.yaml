# Fallback configuration for .github/workflows/promote-to-release.yml
#
# This file is only used if the corresponding repo variable is NOT set
# under Settings > Secrets and variables > Actions > Variables.
# Repo variables always take priority over this file.
#
# Edit these values directly — no need to touch the workflow YAML.

# Branch that PRs are merged into, which triggers this workflow
trigger_branch: main

# Branch to promote the changes to via an auto-created PR
release_branch: release

# Shell command to install dependencies before building (optional, leave empty to skip)
install_command: ""

# Shell command to run the build. Required — workflow fails if this is empty
# and BUILD_COMMAND repo variable is also unset.
# Examples:
#   npm ci && npm run build
#   pip install -r requirements.txt && pytest
#   mvn -B package
build_command: "echo 'Set build_command in this file or BUILD_COMMAND repo variable'"

# Exact toolchain versions to install on the self-hosted runner (no Docker —
# see .github/actions/setup-toolchain). Only the one matching your detected
# ecosystem actually gets used; the rest are ignored.
#
# node_version, java_version, and go_version: if left empty here AND no
# matching repo variable is set, the workflow tries to auto-detect the
# version straight from the codebase before falling back to a hardcoded
# default — see package.json "engines.node", pom.xml / build.gradle[.kts],
# and go.mod respectively. Setting a value here (or as a repo variable)
# always overrides auto-detection.
#
# python_version, maven_version, gradle_version, and rust_version are not
# auto-detected — leave empty to use setup-toolchain's hardcoded default.
node_version: ""
python_version: ""
java_version: ""
maven_version: ""
gradle_version: ""
go_version: ""
rust_version: ""
