name: Build and Promote to Release

# Drop this whole .github folder into any repo to enable:
# On every open PR against the trigger branch (and every new commit pushed
# to it), this fetches the PR's branch + the trigger branch, merges them
# LOCALLY on the runner (this merge is never pushed anywhere), installs the
# right toolchain, and runs the build. If the build succeeds, it opens (or
# updates) a PR using the SAME branch directly against the release branch —
# it does not wait for the original PR to be merged into the trigger branch.
#
# CONFIGURE PER REPO (no YAML editing needed):
#   Preferred: Settings > Secrets and variables > Actions > Variables, set:
#     TRIGGER_BRANCH      e.g. main          (default: main)
#     RELEASE_BRANCH      e.g. release       (default: release)
#     BUILD_COMMAND       e.g. npm ci && npm run build   (default: see fallback config)
#     INSTALL_COMMAND     optional separate install step (default: empty)
#     NODE_VERSION / PYTHON_VERSION / JAVA_VERSION / MAVEN_VERSION /
#     GRADLE_VERSION / GO_VERSION / RUST_VERSION
#                         optional exact toolchain version overrides
#                         (defaults are set in .github/actions/setup-toolchain)
#
#   Auto-detection: if JAVA_VERSION, NODE_VERSION, or GO_VERSION aren't set
#   via repo variable or promote-config.yml, this tries to read them
#   straight from the codebase before falling back to a hardcoded default:
#     Java:   pom.xml (maven.compiler.source/target, java.version, <release>)
#             or build.gradle[.kts] (sourceCompatibility, JavaLanguageVersion)
#     Node:   package.json "engines.node" field
#     Go:     go.mod "go" directive
#   Python, Maven, Gradle, and Rust tool versions are not auto-detected and
#   always use the repo variable / config file / hardcoded default chain.
#
#   Fallback: if repo variables aren't set, this reads
#     .github/promote-config.yml (checked into the repo, edit freely)
#
# HOW BUILDS RUN: no Docker. The detected ecosystem's toolchain (Node, JDK +
# Maven/Gradle, Go, Rust, or Python built from source) is installed directly
# on the runner via .github/actions/setup-toolchain, from official public
# sources (nodejs.org, Adoptium, go.dev, rustup.rs, python.org). Installs are
# cached under $HOME/.toolchains/<name>-<version> (the runner account's own
# home directory, no root/sudo needed) — if that exact version is already
# present from a previous run, the download/install is skipped.
#
# IMPORTANT: the merge of PR branch + trigger branch happens only inside the
# runner's local checkout, purely so the build sees what the code would look
# like if the PR were merged. Nothing is pushed back to the trigger branch
# at any point — that merge is throwaway, recreated fresh on every run.
#
# IMPORTANT: because this runs before the original PR is approved/merged,
# the release-branch PR it opens can exist before the source change has any
# review on the trigger branch. It is opened ready-for-review immediately
# (not as a draft), so two independent reviews end up happening on
# essentially the same diff — one against the trigger branch, one against
# release. That's intentional per how this was configured.
#
# REQUIREMENTS PER REPO (manual, one-time, can't be done by copying files):
#   1. A self-hosted runner must be registered to this repo or its org.
#   2. Node, Java/Maven, Java/Gradle, Go, and Rust install entirely under
#      $HOME/.toolchains — whatever account the runner process runs as,
#      no root or sudo is needed for these. Python is the one exception:
#      building it from source needs system compiler/dev-library packages
#      (gcc, make, *-devel) installed via dnf/yum/apt/pacman, which DOES
#      require root — this will fail on a non-root runner account today.
#      If you need Python support on a non-root runner, either pre-install
#      those system packages once manually (with whatever access you do
#      have), or let me know and we'll add a proper sudo/root path for
#      just that step.
#   3. If RELEASE_BRANCH has branch protection rules, confirm the token
#      used here (default GITHUB_TOKEN, or a PAT in REPO_PAT secret) has
#      permission to push branches and open PRs against it.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'   # we filter against TRIGGER_BRANCH at runtime, see first job

jobs:
  resolve-config:
    runs-on: self-hosted
    outputs:
      trigger_branch: ${{ steps.config.outputs.trigger_branch }}
      release_branch: ${{ steps.config.outputs.release_branch }}
      build_command: ${{ steps.config.outputs.build_command }}
      install_command: ${{ steps.config.outputs.install_command }}
      toolchain_id: ${{ steps.config.outputs.toolchain_id }}
      node_version: ${{ steps.config.outputs.node_version }}
      python_version: ${{ steps.config.outputs.python_version }}
      java_version: ${{ steps.config.outputs.java_version }}
      maven_version: ${{ steps.config.outputs.maven_version }}
      gradle_version: ${{ steps.config.outputs.gradle_version }}
      go_version: ${{ steps.config.outputs.go_version }}
      rust_version: ${{ steps.config.outputs.rust_version }}
      ecosystem: ${{ steps.detect.outputs.ecosystem }}
      should_run: ${{ steps.config.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect ecosystem
        id: detect
        uses: ./.github/actions/detect-ecosystem

      - name: Resolve configuration
        id: config
        env:
          VAR_TRIGGER_BRANCH: ${{ vars.TRIGGER_BRANCH }}
          VAR_RELEASE_BRANCH: ${{ vars.RELEASE_BRANCH }}
          VAR_BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
          VAR_INSTALL_COMMAND: ${{ vars.INSTALL_COMMAND }}
          VAR_NODE_VERSION: ${{ vars.NODE_VERSION }}
          VAR_PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
          VAR_JAVA_VERSION: ${{ vars.JAVA_VERSION }}
          VAR_MAVEN_VERSION: ${{ vars.MAVEN_VERSION }}
          VAR_GRADLE_VERSION: ${{ vars.GRADLE_VERSION }}
          VAR_GO_VERSION: ${{ vars.GO_VERSION }}
          VAR_RUST_VERSION: ${{ vars.RUST_VERSION }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          ECOSYSTEM: ${{ steps.detect.outputs.ecosystem }}
        run: |
          set -e

          CONFIG_FILE=".github/promote-config.yml"
          FILE_TRIGGER_BRANCH=""
          FILE_RELEASE_BRANCH=""
          FILE_BUILD_COMMAND=""
          FILE_INSTALL_COMMAND=""
          FILE_NODE_VERSION=""
          FILE_PYTHON_VERSION=""
          FILE_JAVA_VERSION=""
          FILE_MAVEN_VERSION=""
          FILE_GRADLE_VERSION=""
          FILE_GO_VERSION=""
          FILE_RUST_VERSION=""

          if [ -f "$CONFIG_FILE" ]; then
            echo "Found $CONFIG_FILE, using as fallback source"
            FILE_TRIGGER_BRANCH=$(yq -r '.trigger_branch // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_RELEASE_BRANCH=$(yq -r '.release_branch // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_BUILD_COMMAND=$(yq -r '.build_command // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_INSTALL_COMMAND=$(yq -r '.install_command // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_NODE_VERSION=$(yq -r '.node_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_PYTHON_VERSION=$(yq -r '.python_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_JAVA_VERSION=$(yq -r '.java_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_MAVEN_VERSION=$(yq -r '.maven_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_GRADLE_VERSION=$(yq -r '.gradle_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_GO_VERSION=$(yq -r '.go_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
            FILE_RUST_VERSION=$(yq -r '.rust_version // ""' "$CONFIG_FILE" 2>/dev/null || true)
          fi

          # --------------------------------------------------------------
          # Auto-detect language versions directly from the codebase.
          # Uses plain `grep -E` (POSIX ERE only, no PCRE) since this runs
          # on a minimal RHEL runner where `grep -P` support isn't
          # guaranteed. These are best-effort: if a file doesn't match any
          # known pattern, the detected value stays empty and the priority
          # chain below falls through to the hardcoded default instead.
          # This detection only ever fills a gap — an explicit repo
          # variable or promote-config.yml value always wins over it.
          # --------------------------------------------------------------
          DETECTED_JAVA_VERSION=""
          DETECTED_NODE_VERSION=""
          DETECTED_GO_VERSION=""

          if [ -f "pom.xml" ]; then
            RAW=$(grep -oE '<maven\.compiler\.(source|target)>[0-9._]+' pom.xml 2>/dev/null | grep -oE '[0-9._]+$' | head -1)
            if [ -z "$RAW" ]; then
              RAW=$(grep -oE '<java\.version>[0-9._]+' pom.xml 2>/dev/null | grep -oE '[0-9._]+$' | head -1)
            fi
            if [ -z "$RAW" ]; then
              RAW=$(grep -oE '<release>[0-9._]+' pom.xml 2>/dev/null | grep -oE '[0-9._]+$' | head -1)
            fi
            if [ -n "$RAW" ]; then
              DETECTED_JAVA_VERSION="$RAW"
            fi
          fi

          if [ -z "$DETECTED_JAVA_VERSION" ]; then
            for GRADLE_FILE in build.gradle build.gradle.kts; do
              [ -f "$GRADLE_FILE" ] || continue
              RAW=$(grep -oE "sourceCompatibility[[:space:]]*=[[:space:]]*['\"]?[0-9._]+" "$GRADLE_FILE" 2>/dev/null | grep -oE '[0-9._]+$' | head -1)
              if [ -z "$RAW" ]; then
                RAW=$(grep -oE 'JavaLanguageVersion\.of\([0-9]+' "$GRADLE_FILE" 2>/dev/null | grep -oE '[0-9]+$' | head -1)
              fi
              if [ -n "$RAW" ]; then
                DETECTED_JAVA_VERSION="$RAW"
                break
              fi
            done
          fi

          # Normalize legacy "1.8" style notation to "8", and strip any
          # trailing minor/patch (e.g. "17.0.2" -> "17") since Adoptium's
          # API in setup-toolchain expects a bare major version.
          if [ -n "$DETECTED_JAVA_VERSION" ]; then
            case "$DETECTED_JAVA_VERSION" in
              1.*) DETECTED_JAVA_VERSION="${DETECTED_JAVA_VERSION#1.}" ;;
            esac
            DETECTED_JAVA_VERSION=$(echo "$DETECTED_JAVA_VERSION" | grep -oE '^[0-9]+')
          fi

          if [ -f "package.json" ]; then
            RAW=$(grep -oE '"node"[[:space:]]*:[[:space:]]*"[^"]*"' package.json 2>/dev/null | grep -oE '[0-9]+' | head -1)
            if [ -n "$RAW" ]; then
              DETECTED_NODE_VERSION="$RAW"
            fi
          fi

          if [ -f "go.mod" ]; then
            RAW=$(grep -oE '^go [0-9]+\.[0-9]+' go.mod 2>/dev/null | grep -oE '[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$RAW" ]; then
              DETECTED_GO_VERSION="$RAW"
            fi
          fi

          echo "Detected from codebase: java_version=$DETECTED_JAVA_VERSION node_version=$DETECTED_NODE_VERSION go_version=$DETECTED_GO_VERSION"

          # Ecosystem-based command defaults and the toolchain_id passed to
          # .github/actions/setup-toolchain. detect-ecosystem now reports
          # 'maven' and 'gradle' as distinct ecosystem values directly
          # (rather than a combined 'java'), so no extra gradle-file check
          # is needed here.
          case "$ECOSYSTEM" in
            node)
              ECO_INSTALL="npm ci"
              ECO_BUILD="npm run build"
              TOOLCHAIN_ID="node"
              ;;
            python)
              ECO_INSTALL="pip install -r requirements.txt"
              ECO_BUILD="python -m build"
              TOOLCHAIN_ID="python"
              ;;
            maven)
              ECO_INSTALL=""
              ECO_BUILD="mvn -B package"
              TOOLCHAIN_ID="java-maven"
              ;;
            gradle)
              ECO_INSTALL=""
              ECO_BUILD="gradle build"
              TOOLCHAIN_ID="java-gradle"
              ;;
            go)
              ECO_INSTALL="go mod download"
              ECO_BUILD="go build ./..."
              TOOLCHAIN_ID="go"
              ;;
            rust)
              ECO_INSTALL=""
              ECO_BUILD="cargo build --release"
              TOOLCHAIN_ID="rust"
              ;;
            *)
              ECO_INSTALL=""
              ECO_BUILD=""
              TOOLCHAIN_ID=""
              ;;
          esac

          TRIGGER_BRANCH="${VAR_TRIGGER_BRANCH:-${FILE_TRIGGER_BRANCH:-main}}"
          RELEASE_BRANCH="${VAR_RELEASE_BRANCH:-${FILE_RELEASE_BRANCH:-release}}"
          BUILD_COMMAND="${VAR_BUILD_COMMAND:-${FILE_BUILD_COMMAND:-$ECO_BUILD}}"
          INSTALL_COMMAND="${VAR_INSTALL_COMMAND:-${FILE_INSTALL_COMMAND:-$ECO_INSTALL}}"

          # Version overrides, priority order:
          # repo variable > config file > detected from codebase > hardcoded default.
          # IMPORTANT: the final fallback must resolve to a real, non-empty
          # value here. Composite action inputs only fall back to their own
          # `default:` when the input key is omitted entirely by the caller —
          # passing an empty string explicitly (as job-output wiring does)
          # overrides that default with "". The hardcoded defaults below are
          # kept in sync with setup-toolchain/action.yml's own `default:`
          # values for each input.
          NODE_VERSION="${VAR_NODE_VERSION:-${FILE_NODE_VERSION:-${DETECTED_NODE_VERSION:-20.18.1}}}"
          PYTHON_VERSION="${VAR_PYTHON_VERSION:-${FILE_PYTHON_VERSION:-3.12.7}}"
          JAVA_VERSION="${VAR_JAVA_VERSION:-${FILE_JAVA_VERSION:-${DETECTED_JAVA_VERSION:-21}}}"
          MAVEN_VERSION="${VAR_MAVEN_VERSION:-${FILE_MAVEN_VERSION:-3.9.9}}"
          GRADLE_VERSION="${VAR_GRADLE_VERSION:-${FILE_GRADLE_VERSION:-8.10.2}}"
          GO_VERSION="${VAR_GO_VERSION:-${FILE_GO_VERSION:-${DETECTED_GO_VERSION:-1.22.9}}}"
          RUST_VERSION="${VAR_RUST_VERSION:-${FILE_RUST_VERSION:-stable}}"

          if [ -z "$BUILD_COMMAND" ]; then
            echo "::error::No build command resolved. Detected ecosystem '$ECOSYSTEM' has no default, and BUILD_COMMAND repo variable / promote-config.yml build_command is unset."
            exit 1
          fi

          if [ -z "$TOOLCHAIN_ID" ]; then
            echo "::error::Detected ecosystem '$ECOSYSTEM' has no matching toolchain installer. Add one to .github/actions/setup-toolchain, or set BUILD_COMMAND/INSTALL_COMMAND repo variables and ensure the required tools are already on the runner's PATH."
            exit 1
          fi

          echo "Detected ecosystem: $ECOSYSTEM (toolchain_id: $TOOLCHAIN_ID)"
          echo "Resolved trigger_branch=$TRIGGER_BRANCH"
          echo "Resolved release_branch=$RELEASE_BRANCH"
          echo "Resolved build_command=$BUILD_COMMAND"
          echo "Resolved install_command=$INSTALL_COMMAND"
          echo "Resolved java_version=$JAVA_VERSION (auto-detected: ${DETECTED_JAVA_VERSION:-none})"
          echo "Resolved node_version=$NODE_VERSION (auto-detected: ${DETECTED_NODE_VERSION:-none})"
          echo "Resolved go_version=$GO_VERSION (auto-detected: ${DETECTED_GO_VERSION:-none})"

          SHOULD_RUN="false"
          if [ "$PR_BASE_REF" = "$TRIGGER_BRANCH" ]; then
            SHOULD_RUN="true"
          else
            echo "PR base ref '$PR_BASE_REF' does not match trigger branch '$TRIGGER_BRANCH', skipping"
          fi

          {
            echo "trigger_branch=$TRIGGER_BRANCH"
            echo "release_branch=$RELEASE_BRANCH"
            echo "install_command=$INSTALL_COMMAND"
            echo "toolchain_id=$TOOLCHAIN_ID"
            echo "node_version=$NODE_VERSION"
            echo "python_version=$PYTHON_VERSION"
            echo "java_version=$JAVA_VERSION"
            echo "maven_version=$MAVEN_VERSION"
            echo "gradle_version=$GRADLE_VERSION"
            echo "go_version=$GO_VERSION"
            echo "rust_version=$RUST_VERSION"
            echo "should_run=$SHOULD_RUN"
          } >> "$GITHUB_OUTPUT"

          # build_command may contain special chars / multiline, use a delimiter
          {
            echo "build_command<<BUILD_CMD_EOF"
            echo "$BUILD_COMMAND"
            echo "BUILD_CMD_EOF"
          } >> "$GITHUB_OUTPUT"

  build-and-promote:
    needs: resolve-config
    if: needs.resolve-config.outputs.should_run == 'true'
    runs-on: self-hosted

    env:
      RELEASE_BRANCH: ${{ needs.resolve-config.outputs.release_branch }}
      TRIGGER_BRANCH: ${{ needs.resolve-config.outputs.trigger_branch }}
      BUILD_COMMAND: ${{ needs.resolve-config.outputs.build_command }}
      INSTALL_COMMAND: ${{ needs.resolve-config.outputs.install_command }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
      ECOSYSTEM: ${{ needs.resolve-config.outputs.ecosystem }}
      GH_TOKEN: ${{ secrets.REPO_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_PAT || secrets.GITHUB_TOKEN }}
          clean: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and merge PR branch locally
        id: local_merge
        run: |
          set -e

          git fetch origin "$TRIGGER_BRANCH"
          git checkout -B "$TRIGGER_BRANCH" "origin/$TRIGGER_BRANCH"

          # PRs from a fork have a different head repo than this one — fetch
          # from the correct remote either way. Same-repo PRs (the common
          # case for this self-hosted setup) just fetch the branch directly.
          if [ "$PR_HEAD_REPO_FULL_NAME" = "$GITHUB_REPOSITORY" ]; then
            git fetch origin "$PR_HEAD_REF"
            MERGE_REF="origin/$PR_HEAD_REF"
          else
            git fetch "https://github.com/${PR_HEAD_REPO_FULL_NAME}.git" "$PR_HEAD_REF"
            MERGE_REF="FETCH_HEAD"
          fi

          echo "Merging PR #$PR_NUMBER ($PR_HEAD_REF @ $PR_HEAD_SHA) into local $TRIGGER_BRANCH"
          echo "This merge is local only — it is never pushed back to $TRIGGER_BRANCH."

          # If this fails (real conflicts), the step fails and the rest of
          # the job is skipped — see "Notify on build failure" below, which
          # also catches merge failures, not just build failures.
          git merge --no-ff --no-edit "$MERGE_REF" -m "Local merge check: PR #$PR_NUMBER into $TRIGGER_BRANCH"

          echo "Local merge result:"
          git log -1 --oneline

      - name: Setup toolchain
        id: toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          ecosystem: ${{ needs.resolve-config.outputs.toolchain_id }}
          node_version: ${{ needs.resolve-config.outputs.node_version }}
          python_version: ${{ needs.resolve-config.outputs.python_version }}
          java_version: ${{ needs.resolve-config.outputs.java_version }}
          maven_version: ${{ needs.resolve-config.outputs.maven_version }}
          gradle_version: ${{ needs.resolve-config.outputs.gradle_version }}
          go_version: ${{ needs.resolve-config.outputs.go_version }}
          rust_version: ${{ needs.resolve-config.outputs.rust_version }}

      - name: Install dependencies
        if: env.INSTALL_COMMAND != ''
        run: |
          set -e
          export PATH="${TOOLCHAIN_BIN}:${PATH}"
          eval "$INSTALL_COMMAND"

      - name: Run build
        id: build
        run: |
          set -e
          export PATH="${TOOLCHAIN_BIN}:${PATH}"
          eval "$BUILD_COMMAND"

      - name: Create promotion branch from release
        if: success()
        run: |
          set -e
          git fetch origin "$RELEASE_BRANCH"

          BRANCH_NAME="promote/pr-${PR_NUMBER}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

          # Reset any leftover branch from a previous run on this PR (e.g. an
          # earlier push that already created/updated this promotion branch)
          git branch -D "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME" "origin/$RELEASE_BRANCH"

          # Merge the PR's own branch (not the throwaway trigger-branch merge
          # from the previous step) onto release. This is what actually gets
          # proposed — the PR's real changes, on top of release as it stands
          # now, regardless of whether the PR has been merged into the
          # trigger branch yet.
          if [ "$PR_HEAD_REPO_FULL_NAME" = "$GITHUB_REPOSITORY" ]; then
            MERGE_REF="origin/$PR_HEAD_REF"
          else
            MERGE_REF="FETCH_HEAD"
          fi
          git merge --no-ff --no-edit "$MERGE_REF" -m "Promote PR #${PR_NUMBER} to ${RELEASE_BRANCH}"

          # force-with-lease is safe here even though we just deleted the
          # local branch above, because the remote branch (if any) is
          # untouched until this push — lease still protects against someone
          # else having pushed to promote/pr-<N> in between.
          git push origin "$BRANCH_NAME" --force-with-lease

      - name: Open PR against release branch
        if: success()
        run: |
          set -e
          EXISTING=$(gh pr list --base "$RELEASE_BRANCH" --head "$BRANCH_NAME" --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ]; then
            echo "PR already open against $RELEASE_BRANCH for this branch: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --base "$RELEASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE (#$PR_NUMBER)" \
            --body "Auto-opened from PR #${PR_NUMBER} (\`${PR_HEAD_REF}\`) by @${PR_AUTHOR} after a successful local build check against \`${TRIGGER_BRANCH}\` (ecosystem: ${ECOSYSTEM}). Note: PR #${PR_NUMBER} may not be merged into \`${TRIGGER_BRANCH}\` yet — this PR reflects its current state and will update automatically on new commits." \
            --label "auto-promotion" || \
          gh pr create \
            --base "$RELEASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE (#$PR_NUMBER)" \
            --body "Auto-opened from PR #${PR_NUMBER} (\`${PR_HEAD_REF}\`) by @${PR_AUTHOR} after a successful local build check against \`${TRIGGER_BRANCH}\` (ecosystem: ${ECOSYSTEM}). Note: PR #${PR_NUMBER} may not be merged into \`${TRIGGER_BRANCH}\` yet — this PR reflects its current state and will update automatically on new commits."
          # second gh pr create is a fallback in case the 'auto-promotion'
          # label doesn't exist in this repo yet

      - name: Notify on build failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          gh pr comment "$PR_NUMBER" --body "⚠️ Build failed for the latest commit on this PR (checked locally against \`${TRIGGER_BRANCH}\`). Nothing was opened against \`${RELEASE_BRANCH}\`. Check the workflow run for details." || true

      - name: Notify on merge conflict
        if: failure() && steps.local_merge.outcome == 'failure'
        run: |
          gh pr comment "$PR_NUMBER" --body "⚠️ This PR could not be merged locally against \`${TRIGGER_BRANCH}\` for the build check (likely a merge conflict). Build was not run, and nothing was opened against \`${RELEASE_BRANCH}\`. Please resolve conflicts with \`${TRIGGER_BRANCH}\`." || true
