name: Diagnose Opt Permission Issue

on: [push]

jobs:
  diagnose:
    runs-on: self-hosted
    steps:
      - name: Identity check
        run: |
          echo "## Identity"
          whoami
          id
          echo "EUID check via bash:"
          echo "EUID=$EUID"

      - name: /opt details
        run: |
          echo "## /opt ownership and permissions"
          ls -ld /opt
          stat /opt
          echo ""
          echo "## Mount info for /opt"
          mount | grep -E " /opt | / " || true
          df -h /opt
          echo ""
          echo "## Filesystem flags (read-only mount check)"
          findmnt -no OPTIONS /opt 2>/dev/null || echo "findmnt not available"

      - name: Immutable attribute check
        run: |
          echo "## chattr (immutable flag) check on /opt"
          if command -v lsattr >/dev/null 2>&1; then
            lsattr -d /opt 2>&1 || echo "lsattr failed (may need different perms to read)"
          else
            echo "lsattr not available"
          fi

      - name: SELinux check
        run: |
          echo "## SELinux status"
          if command -v getenforce >/dev/null 2>&1; then
            getenforce
          else
            echo "getenforce not found"
          fi
          echo ""
          echo "## SELinux context of /opt"
          if command -v ls >/dev/null 2>&1; then
            ls -ldZ /opt 2>&1 || echo "ls -Z failed"
          fi
          echo ""
          echo "## Recent SELinux denials (last 20, if ausearch available)"
          if command -v ausearch >/dev/null 2>&1; then
            ausearch -m avc -ts recent 2>&1 | tail -40 || echo "ausearch found nothing or needs different perms"
          else
            echo "ausearch not available"
          fi
          echo ""
          echo "## Recent denials via journalctl (alternative)"
          if command -v journalctl >/dev/null 2>&1; then
            journalctl -t setroubleshoot --since "10 minutes ago" 2>&1 | tail -40 || true
            journalctl -k --since "10 minutes ago" 2>&1 | grep -i avc | tail -40 || echo "no avc denials found in kernel log"
          else
            echo "journalctl not available"
          fi

      - name: Try the actual failing command directly
        run: |
          echo "## Direct mkdir attempt with verbose error"
          mkdir -p /opt/toolchains 2>&1 || echo "FAILED with exit code $?"
          echo ""
          echo "## Try a different, definitely-writable-by-root location for comparison"
          mkdir -p /root/toolchains-test 2>&1 && echo "SUCCESS writing to /root" || echo "FAILED writing to /root too"
          rm -rf /root/toolchains-test 2>/dev/null || true
          echo ""
          echo "## Try /opt itself with touch (simpler than mkdir)"
          touch /opt/test-write-file 2>&1 && echo "touch SUCCESS" || echo "touch FAILED"
          rm -f /opt/test-write-file 2>/dev/null || true
