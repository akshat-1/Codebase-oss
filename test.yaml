name: Diagnose Runner Environment

# One-off workflow to inspect what's available on the self-hosted runner
# before deciding how to handle multi-ecosystem builds.
# Trigger manually from the Actions tab, then read the job summary/logs.
# Safe to delete after you've checked.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: self-hosted
    steps:
      - name: Basic runner info
        run: |
          echo "## Runner OS / Arch"
          uname -a
          echo ""
          echo "## Current user"
          whoami
          id
          echo ""
          echo "## Disk space"
          df -h .
          echo ""
          echo "## Home / workspace"
          echo "HOME=$HOME"
          pwd

      - name: Check Docker
        run: |
          echo "## Docker"
          if command -v docker >/dev/null 2>&1; then
            docker --version
            echo "--- Can current user run docker without sudo? ---"
            docker ps >/dev/null 2>&1 && echo "YES - docker works" || echo "NO - permission denied or daemon not running"
          else
            echo "docker: NOT FOUND"
          fi

      - name: Check Node / npm / yarn / pnpm
        run: |
          echo "## Node ecosystem"
          for cmd in node npm yarn pnpm nvm; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd: $($cmd --version 2>&1 | head -1)"
            else
              echo "$cmd: NOT FOUND"
            fi
          done

      - name: Check Python
        run: |
          echo "## Python ecosystem"
          for cmd in python python3 pip pip3 poetry pyenv; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd: $($cmd --version 2>&1 | head -1)"
            else
              echo "$cmd: NOT FOUND"
            fi
          done

      - name: Check Java / Maven / Gradle
        run: |
          echo "## Java ecosystem"
          for cmd in java javac mvn gradle; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd: $($cmd -version 2>&1 | head -1)"
            else
              echo "$cmd: NOT FOUND"
            fi
          done
          echo ""
          echo "JAVA_HOME=$JAVA_HOME"
          if command -v update-alternatives >/dev/null 2>&1; then
            echo "--- Installed JDKs (update-alternatives) ---"
            update-alternatives --list java 2>/dev/null || echo "none registered"
          fi

      - name: Check Go / Rust
        run: |
          echo "## Go / Rust"
          for cmd in go cargo rustc; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd: $($cmd version 2>&1 | head -1)"
            else
              echo "$cmd: NOT FOUND"
            fi
          done

      - name: Check version managers (asdf, sdkman)
        run: |
          echo "## Version managers"
          for cmd in asdf sdk; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd: found"
            else
              echo "$cmd: NOT FOUND"
            fi
          done
          [ -d "$HOME/.asdf" ] && echo "~/.asdf directory exists"
          [ -d "$HOME/.sdkman" ] && echo "~/.sdkman directory exists"

      - name: Check network / package registry access
        run: |
          echo "## Network access (matches your configured allowlist)"
          for url in https://registry.npmjs.org https://pypi.org https://repo.maven.apache.org https://github.com; do
            if curl -sSf -o /dev/null --max-time 5 "$url"; then
              echo "$url: reachable"
            else
              echo "$url: NOT reachable"
            fi
          done

      - name: Summary
        run: |
          echo "## Done"
          echo "Review the logs above for each step to see what's pre-installed."
          echo "Send these results back and the real workflow will be wired to match."
