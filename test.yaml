name: Multi-Ecosystem Deep Scan

on: [push, pull_request, workflow_dispatch]

jobs:
  detect-ecosystem:
      runs-on: self-hosted 

          outputs:
                ecosystem: ${{ steps.check-files.outputs.ecosystem }}

                    steps:
                          - name: Checkout repository
                                  uses: actions/checkout@v4

                                        - name: Identify All Ecosystems
                                                id: check-files
                                                        shell: bash
                                                                run: |
                                                                          WORKSPACE_PATH="${{ github.workspace }}"
                                                                                    echo "Deep-scanning workspace: $WORKSPACE_PATH"
                                                                                              
                                                                                                        # Initialize an empty array to collect findings
                                                                                                                  ECOSYSTEMS=()
                                                                                                                            
                                                                                                                                      # Helper shortcut to find files while ignoring heavy dependency/build folders
                                                                                                                                                # This prevents your self-hosted runner from slowing down in massive directories
                                                                                                                                                          find_file() {
                                                                                                                                                                      find "$WORKSPACE_PATH" -type d \( -name "node_modules" -o -name ".git" -o -name "target" -o -name ".gradle" -o -name "venv" -o -name ".venv" \) -prune -o -name "$1" -print -quit
                                                                                                                                                                                }

                                                                                                                                                                                          # 1. Check for Node
                                                                                                                                                                                                    if [ -n "$(find_file "package.json")" ]; then
                                                                                                                                                                                                                ECOSYSTEMS+=("node")
                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                              # 2. Check for Maven
                                                                                                                                                                                                                                                        if [ -n "$(find_file "pom.xml")" ]; then
                                                                                                                                                                                                                                                                    ECOSYSTEMS+=("maven")
                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                  # 3. Check for Gradle
                                                                                                                                                                                                                                                                                                            if [ -n "$(find_file "build.gradle")" ] || [ -n "$(find_file "build.gradle.kts")" ]; then
                                                                                                                                                                                                                                                                                                                        ECOSYSTEMS+=("gradle")
                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                      # 4. Check for Python/Pip
                                                                                                                                                                                                                                                                                                                                                                if [ -n "$(find_file "requirements.txt")" ] || [ -n "$(find_file "pyproject.toml")" ] || [ -n "$(find_file "setup.py")" ]; then
                                                                                                                                                                                                                                                                                                                                                                            ECOSYSTEMS+=("pip/python")
                                                                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                          # 5. Check for Go
                                                                                                                                                                                                                                                                                                                                                                                                                    if [ -n "$(find_file "go.mod")" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                ECOSYSTEMS+=("go")
                                                                                                                                                                                                                                                                                                                                                                                                                                          fi

                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Combine array elements separated by ' and '
                                                                                                                                                                                                                                                                                                                                                                                                                                                              RESULT=""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ ${#ECOSYSTEMS[@]} -eq 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    RESULT="unknown"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          for i in "${!ECOSYSTEMS[@]}"; do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ $i -eq 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        RESULT="${ECOSYSTEMS[$i]}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      RESULT="$RESULT and ${ECOSYSTEMS[$i]}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                done
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Detected combined ecosystems: $RESULT"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "ecosystem=$RESULT" >> $GITHUB_OUTPUT

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Handle Detected Ecosystems
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "The active codebase profiles are: ${{ steps.check-files.outputs.ecosystem }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # Use string matching to run tasks conditionally
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [[ "${{ steps.check-files.outputs.ecosystem }}" == *"node"* ]]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "-> Found Node! Executing Node/NPM build tasks..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [[ "${{ steps.check-files.outputs.ecosystem }}" == *"maven"* ]]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "-> Found Maven! Executing Maven build tasks..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if [[ "${{ steps.check-files.outputs.ecosystem }}" == *"gradle"* ]]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "-> Found Gradle! Executing Gradle build tasks..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
